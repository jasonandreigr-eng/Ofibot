<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ofibot - Panel Tecnico</title>
  <style>
      :root[data-theme="light"] {
	--bg: #f4f4f4; --text: #222; --card: #fff; --accent: #4a90d9; --border: #ccc;
      }
      :root[data-theme="dark"] {
        --bg: #1a1a1a; --text: #eee; --card: #2b2b2b; --accent: #6aa8e0; --border: #444;
      }
      body {
	font-family: sans-serif; padding: 2rem; max-width: 700px; margin: auto;
	background: var(--bg); color: var(--text);
	transition: background 0.3s, color 0.3s;
      }
      .config { margin-bottom: 2rem; }
      label { display: block; margin-top: 1rem; }
      input[type=range] { width: 100%; }
      table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
      th, td { border: 1px solid var(--border); padding: 0.5rem; text-align: left; }
      button { padding: 0.5rem 1rem; border: none; border-radius: 6px;
               background: var(--accent); color: #fff; cursor: pointer; }
      #mensaje { color: green; font-weight: bold; }
      #toggle-tema { position: fixed; top: 1rem; right: 1rem; }
  </style>
</head>
<body>
  <button id="toggle-tema" onclick="cambiarTema()"> Modo </button>
  <h1>Panel Tecnico - Ofibot</h1>

  <div class="config">
    <h3>Configuracion</h3>
    <label>Sociabilidad: <span id="val_sociabilidad">5</span>/10</label>
    <input type="range" id="sociabilidad" min="1" max="10" value="5"
           oninput="document.getElementById('val_sociabilidad').innerText = this.value">

    <label>Formalidad: <span id="val_formalidad">5</span>/10</label>
    <input type="range" id="formalidad" min="1" max="10" value="5"
           oninput="document.getElementById('val_formalidad').innerText = this.value">

    <label>Estado de animo base: <span id="val_animo_nivel">5</span>/10 (1=triste, 10=feliz)</label>
    <input type="range" id="animo_nivel" min="1" max="10" value="5"
           oninput="document.getElementById('val_animo_nivel').innerText = this.value">

    <button onclick="guardarConfig()">Guardar configuracion</button>
    <p id="mensaje"></p>
  </div>

  <div class="historial">
    <h3>Historial de usuarios</h3>
    <table id="tabla_historial">
      <thead>
        <tr><th>Nombre</th><th>Hora</th><th>Duracion (s)</th></tr>
      </thead>
      <tbody id="cuerpo_historial">
        <tr><td colspan="3">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const TOKEN = prompt("Token de acceso tecnico:");

    async function guardarConfig() {
      const sociabilidad = document.getElementById("sociabilidad").value;
      const formalidad = document.getElementById("formalidad").value;
      const animo_nivel = document.getElementById("animo_nivel").value;

      const res = await fetch("/api/config", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + TOKEN
        },
        body: JSON.stringify({
          sociabilidad: parseInt(sociabilidad),
          formalidad: parseInt(formalidad),
          estado_animo_nivel: parseInt(animo_nivel)
        })
      });

      const mensaje = document.getElementById("mensaje");
      if (res.status === 401) {
        mensaje.style.color = "red";
        mensaje.innerText = "Token invalido. Recarga la pagina e intenta de nuevo.";
      } else {
        mensaje.style.color = "green";
        mensaje.innerText = "Configuracion guardada correctamente.";
      }
    }

    async function cargarHistorial() {
      const res = await fetch("/api/historial", {
        headers: { "Authorization": "Bearer " + TOKEN }
      });

      const cuerpo = document.getElementById("cuerpo_historial");

      if (res.status === 401) {
        cuerpo.innerHTML = "<tr><td colspan='3'>Token invalido</td></tr>";
        return;
      }

      const data = await res.json();

      if (data.length === 0) {
        cuerpo.innerHTML = "<tr><td colspan='3'>Sin registros aun</td></tr>";
        return;
      }

      cuerpo.innerHTML = data.map(item => `
        <tr>
          <td>${item.nombre}</td>
          <td>${item.hora}</td>
          <td>${item.duracion_seg ?? "-"}</td>
        </tr>
      `).join("");
    }

    // Se ejecuta apenas carga la pagina
    cargarHistorial();
    function aplicarTema(tema) {
	document.documentElement.setAttribute("data-theme", tema);
	localStorage.setItem("ofibot_tema", tema);
    }

    function cambiarTema() {
	const actual = document.documentElement.getAttribute("data-theme");
	aplicarTema(actual === "dark" ? "light" : "dark");
    }

    aplicarTema(localStorage.getItem("ofibot_tema") || "light");
  </script>
</body>
</html>
